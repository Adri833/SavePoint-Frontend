<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-header">
    <button class="collapse-btn" [class.expanded]="!collapsed" (click)="toggle()"></button>
  </div>

  <nav class="menu">
    <app-sidebar-item
      routerLink="/home/biblioteca"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      icon="/library.svg"
      iconActive="/library-filled.svg"
      label="Biblioteca"
      [collapsed]="collapsed"
    >
    </app-sidebar-item>

    <app-sidebar-item
      routerLink="/home/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      icon="/dashboard.svg"
      iconActive="/dashboard-filled.svg"
      label="Dashboard"
      [collapsed]="collapsed"
    >
    </app-sidebar-item>

    <app-sidebar-item
      routerLink="/home/profile"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      icon="/user_outfilled.png"
      iconActive="/user_filled.png"
      label="Perfil"
      [collapsed]="collapsed"
    >
    </app-sidebar-item>
  </nav>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      @if (!collapsed) {
        <span>Cerrar sesión</span>
      }
    </button>
  </div>
</aside>
