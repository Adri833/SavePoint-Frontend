<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-header">
    <button class="collapse-btn" [class.expanded]="!collapsed" (click)="toggle()"></button>
  </div>

  <nav class="menu">
    <app-sidebar-item
      routerLink="/home/playthroughs"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      icon="/library.svg"
      iconActive="/library-filled.svg"
      label="Biblioteca"
      [collapsed]="collapsed"
    >
    </app-sidebar-item>

    <app-sidebar-item
      routerLink="/home/backlog"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      icon="/backlog_outfilled.png"
      iconActive="/backlog_filled.png"
      label="Backlog"
      [collapsed]="collapsed"
    >
    </app-sidebar-item>

    <app-sidebar-item
      routerLink="/home/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      icon="/dashboard.svg"
      iconActive="/dashboard-filled.svg"
      label="Dashboard"
      [collapsed]="collapsed"
    >
    </app-sidebar-item>

    <app-sidebar-item
      routerLink="/home/profile"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      icon="/user_outfilled.png"
      iconActive="/user_filled.png"
      label="Perfil"
      [collapsed]="collapsed"
    >
    </app-sidebar-item>

    <app-sidebar-item
      routerLink="/home/friends"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      icon="/add-user.png"
      iconActive="/add-user-filled.png"
      label="Amigos"
      [collapsed]="collapsed"
    >
    </app-sidebar-item>
  </nav>

  <div class="sidebar-footer">
    <app-social-icon
      icon="/discord.svg"
      href="https://discord.gg/FfSDhxhV7p"
      label="¡Únete a nuestro Discord!"
      [showLabel]="!collapsed"
      target="_blank"
    ></app-social-icon>
  </div>
</aside>
