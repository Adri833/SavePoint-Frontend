<header class="navbar">
  <a class="navbar-brand" routerLink="/">
    <img src="/logo_savepoint_sinfondo.png" alt="Savepoint logo" class="brand-logo" />
    <span class="brand-name">Savepoint</span>
  </a>

  <div class="navbar-center">
    <div class="search-wrap">
      <svg
        class="search-icon"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input #searchInput type="text" placeholder="Buscar juegos..." (input)="onSearch($event)" />
    </div>
  </div>
</header>
