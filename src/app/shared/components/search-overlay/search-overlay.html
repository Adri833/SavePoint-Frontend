@if (query) {
  <div class="search-overlay" (click)="closeOverlay()">
    <div class="results" (click)="$event.stopPropagation()">
      @if (loading) {
        <div class="loading">
          <div class="spinner"></div>
          Buscando juegos…
        </div>
      }

      @if (!loading && results.length) {
        <div class="games">
          @for (game of results; track game.id) {
            <div class="game-card" (click)="goToGame(game.id)">
              <img [src]="game.background_image" alt="" />
              <div class="info">
                <app-platform-icons
                  [platforms]="game.parent_platforms ?? []"
                  size="sm"
                ></app-platform-icons>
                <h4>{{ game.name }}</h4>
              </div>
            </div>
          }
        </div>
      }

      @if (!loading && !results.length) {
        <p class="empty">No se encontraron juegos</p>
      }
    </div>
  </div>
}
